# PetPals Supervisor Policy
# This policy is tailored for a ChatGPT connection acting as a CAO (Chief AI Officer) supervisor
# for the PetPals ecosystem.

project:
  root: ~/Documents/GitHub/PetPalsCursor
  max_file_read_bytes: 200000
  max_search_results: 100
  deny:
    - "*.pem"
    - "*.key"
    - ".env*"
    - "id_rsa*"
    - "id_ed25519*"
    - "known_hosts"
    - ".ssh/"
    - "~/Library/Keychains"
    - "*.mobileprovision"
    - ".git/objects/**"
    - "dist/**"
    - "build/**"
    - ".expo/**"
    - "coverage/**"
    - "node_modules/"
    - ".git/"

workspaces:
  allowed_prefixes:
    - "petpals-"

agents:
  allowed_prefixes:
    - "cursor-"
    - "codex-"
    - "gemini-"
    - "qwen-"

surfaces:
  allowed_name_prefixes:
    - "main"
    - "dev"
    - "test"

tools:
  allow:
    - "system.health"
    - "system.version"
    - "system.policy"
    - "project.info"
    - "project.tree"
    - "project.read_file"
    - "project.search"
    - "project.git_status"
    - "project.git_diff"
    - "cmux.list_surfaces"
    - "cmux.read_screen"
    - "agent.list"
    - "agent.status"
    - "agent.read"
    - "agent.extract_errors"
    - "audit.recent"
  require_confirmation:
    - "agent.send_task"
    - "agent.continue"
  deny:
    - "system.memory_usage"

commands:
  deny_patterns:
    - 'rm\s+-rf'
    - '>\s*/dev/null'
    - 'curl.*\|.*sh'
    - 'wget.*\|.*sh'
    - '\bsudo\b'
    - '\bmkfs\b'
    - 'dd\s+if='
    - ':\(\)\{\s*:\s*\|.*;\s*\}'
    - '\beval\b'
    - 'base64\s+--decode'
    - '~/.ssh'
    - '/etc/shadow'
    - '/etc/passwd'
  require_confirmation_patterns:
    - 'git\s+push'
    - 'git\s+.*force'
    - 'npm\s+publish'
    - '\bdocker\b'
    - '\bkubectl\b'

audit:
  path: ~/.local/share/chatgpt-mcp-cmux/audit.jsonl
  redact_secrets: true
  log_full_inputs: false
  log_input_preview_chars: 300

limits:
  max_output_lines: 500
  max_screen_chars: 50000
  max_request_body_bytes: 100000
  tool_timeout_ms: 30000
  max_concurrent_requests: 5
