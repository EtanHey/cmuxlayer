name: Bug Report
description: File a bug report for ChatGPTMCPcmux
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: How to reproduce the issue?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: What version of ChatGPTMCPcmux are you using?
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Operating Mode
      description: Are you running in standard upstream mode or Secure Remote Mode?
      options:
        - Secure Mode (with --config)
        - Standard Mode (without --config)
    validations:
      required: true
